<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — ERC Event Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px; background: #f5f5f5; color: #1a1a1a; min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* ── Header ─────────────────────────────────────────── */
    .event-header { background: #500000; color: #fff; padding: 24px 24px 20px; }
    .event-header-inner { max-width: 900px; margin: 0 auto; }
    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.8rem; color: rgba(255,255,255,0.65); text-decoration: none; margin-bottom: 10px;
    }
    .back-link:hover { color: #fff; }

    .header-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .header-title-block { flex: 1; }
    .event-header h1 {
      font-family: 'Work Sans', sans-serif; font-size: 1.45rem; font-weight: 700;
      margin-bottom: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .type-badge-header {
      display: inline-block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 3px 10px; border-radius: 4px;
      background: rgba(255,255,255,0.18); color: #fff; vertical-align: middle;
    }
    .event-header-meta {
      font-size: 0.875rem; color: rgba(255,255,255,0.7); display: flex; gap: 14px;
      flex-wrap: wrap; margin-bottom: 12px;
    }

    /* ── Progress in header ─────────────────────────────── */
    .header-progress {
      display: flex; align-items: center; gap: 10px; margin-top: 2px;
    }
    .header-progress-bar {
      flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden;
      max-width: 200px;
    }
    .header-progress-fill { height: 100%; background: rgba(255,255,255,0.85); border-radius: 3px; transition: width 0.4s; }
    .header-progress-text { font-size: 0.78rem; color: rgba(255,255,255,0.7); white-space: nowrap; }

    /* Edit page button in header */
    .edit-page-btn {
      font-size: 0.78rem; font-weight: 600; padding: 6px 14px; border-radius: 5px; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.4); background: transparent; color: rgba(255,255,255,0.85);
      font-family: inherit; white-space: nowrap; flex-shrink: 0; margin-top: 4px; transition: all 0.15s;
    }
    .edit-page-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.7); }
    .edit-page-btn.active { background: #fff; color: #500000; border-color: #fff; }

    /* ── Main ───────────────────────────────────────────── */
    .event-main { max-width: 900px; margin: 0 auto; padding: 20px 24px 60px; }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 20px 22px; margin-bottom: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card h2 {
      font-family: 'Work Sans', sans-serif; font-size: 0.9rem; font-weight: 700; color: #333;
      margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* ── Editable fields ────────────────────────────────── */
    .editable-field {
      display: inline; outline: none; border-radius: 3px; transition: background 0.1s;
    }
    body.editing .editable-field {
      display: inline-block; background: #fafafa; border: 1px solid #d0d0d0;
      border-radius: 4px; cursor: text; padding: 6px 10px; min-width: 40px;
    }
    body.editing .editable-field:focus {
      background: #fff; border-color: #999; outline: none;
    }
    .empty-field { color: #ccc; font-style: italic; }
    body.editing .empty-field { color: #bbb; }

    /* ── Detail grid ────────────────────────────────────── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 20px; }
    .detail-item label {
      display: block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #aaa; margin-bottom: 3px;
    }
    .detail-item span { font-size: 0.9rem; color: #333; }
    .detail-item.full-width { grid-column: 1 / -1; }

    /* ── Links row ──────────────────────────────────────── */
    .links-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .ext-link {
      display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 600;
      color: #500000; background: #fdf0f0; padding: 6px 14px; border-radius: 5px;
      text-decoration: none; transition: background 0.15s; border: 1px solid transparent;
    }
    .ext-link:hover { background: #f8dede; }
    .ext-link .ext-icon { font-size: 0.7rem; opacity: 0.6; }
    .ext-link.needs-link { color: #bbb; background: #fafafa; border: 1px dashed #ddd; cursor: default; }
    .ext-link.needs-link:hover { background: #fafafa; }

    /* ── Link edit section (edit mode only) ─────────────── */
    .link-edit-section { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .link-edit-section .link-field label {
      font-size: 0.68rem; font-weight: 600; color: #aaa; display: block;
      margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .link-edit-section input[type="url"] {
      width: 100%; font-size: 0.82rem; padding: 6px 9px; border: 1.5px solid #ccc;
      border-radius: 5px; font-family: inherit; outline: none; transition: border-color 0.15s; color: #333;
    }
    .link-edit-section input[type="url"]:focus { border-color: #500000; }

    /* ── Description / blurb ────────────────────────────── */
    .event-description { font-size: 0.9rem; line-height: 1.6; color: #444; }

    .blurb-text {
      font-size: 0.875rem; line-height: 1.6; color: #444;
      background: #fafafa; border-radius: 6px; padding: 14px 16px;
      border-left: 3px solid #500000;
    }

    /* ── Speaker ────────────────────────────────────────── */
    .speaker-entry { padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
    .speaker-entry:last-child { border-bottom: none; }
    .speaker-top { display: flex; align-items: flex-start; gap: 14px; }
    .speaker-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: #eee;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: #aaa; flex-shrink: 0;
    }
    .speaker-info { flex: 1; }
    .speaker-info h3 { font-size: 0.95rem; font-weight: 600; color: #333; }
    .speaker-info .speaker-meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .speaker-details { margin-top: 10px; padding-left: 58px; }
    .speaker-details .detail-row { display: flex; gap: 8px; font-size: 0.82rem; margin-bottom: 5px; }
    .speaker-details .detail-label { font-weight: 600; color: #aaa; min-width: 110px; flex-shrink: 0; }

    /* ── Promo log ──────────────────────────────────────── */
    .promo-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .promo-table th {
      text-align: left; font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #aaa; padding: 6px 4px; border-bottom: 1px solid #eee;
    }
    .promo-table td { padding: 8px 4px; border-bottom: 1px solid #f5f5f5; color: #333; vertical-align: middle; }
    .status-badge {
      font-size: 0.68rem; font-weight: 600; padding: 2px 8px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.03em; cursor: pointer;
    }
    .status-pending { background: #fdf6ec; color: #7a5500; }
    .status-sent    { background: #edfaf1; color: #1a6b3c; }
    .status-na      { background: #f0f0f0; color: #999; }

    /* ── Task filter bar ────────────────────────────────── */
    .task-filter-bar { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn {
      font-family: 'Work Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
      padding: 4px 13px; border-radius: 12px; border: 1.5px solid #ddd;
      background: #fff; color: #888; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #500000; color: #500000; }
    .filter-btn.active { background: #500000; color: #fff; border-color: #500000; }

    /* ── Task table ─────────────────────────────────────── */
    .task-tbl { width: 100%; border-collapse: collapse; }
    .task-tbl thead th {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      color: #bbb; text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee;
    }
    .task-check-cell { width: 28px; padding: 10px 6px 10px 4px; vertical-align: top; }
    .task-check { width: 16px; height: 16px; margin-top: 1px; accent-color: #500000; cursor: pointer; }
    .task-name-cell { padding: 10px 8px; vertical-align: top; }
    .task-due-cell { width: 68px; padding: 10px 8px; vertical-align: top; font-size: 0.78rem; color: #aaa; white-space: nowrap; }
    .task-due-cell.overdue { color: #c0392b; font-weight: 600; }
    .task-due-cell.today   { color: #500000; font-weight: 600; }
    .task-who-cell { width: 44px; padding: 10px 4px 10px 8px; vertical-align: top; text-align: right; }
    .task-main-row { border-bottom: 1px solid #f5f5f5; }
    .task-main-row:hover .task-name-cell { background: #fafafa; }
    .task-main-row.done .task-name-text { text-decoration: line-through; color: #bbb; }
    .task-name-text { font-size: 0.875rem; color: #1a1a1a; line-height: 1.4; }
    .task-badge {
      display: inline-block; font-size: 0.68rem; font-weight: 700; color: #666;
      background: #f0f0f0; padding: 2px 6px; border-radius: 3px;
    }
    .task-badge.done-badge { background: #edfaf1; color: #1a6b3c; }
    .expand-btn {
      font-size: 0.65rem; color: #ccc; background: none; border: none; cursor: pointer;
      padding: 0 4px; vertical-align: middle; transition: color 0.15s;
    }
    .expand-btn:hover { color: #500000; }
    .task-detail-row td { padding: 0 8px 10px 36px; font-size: 0.78rem; }
    .task-note-text { color: #999; line-height: 1.5; }
    .section-divider-row td {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      color: #500000; padding: 14px 8px 6px; border-bottom: 1px solid #f0f0f0;
    }
    .filter-hidden { display: none; }

    /* ── Inline initials input ──────────────────────────── */
    .initials-inline {
      display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap;
    }
    .initials-input {
      font-family: 'Work Sans', sans-serif; font-size: 0.8rem; font-weight: 700;
      width: 44px; padding: 4px 6px; border: 1.5px solid #500000; border-radius: 4px;
      text-transform: uppercase; text-align: center; letter-spacing: 0.05em; outline: none;
      color: #500000;
    }
    .mark-done-btn {
      font-family: inherit; font-size: 0.78rem; font-weight: 700;
      background: #500000; color: #fff; border: none; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; transition: background 0.15s;
    }
    .mark-done-btn:hover { background: #3a0000; }
    .initials-cancel {
      font-size: 0.72rem; color: #aaa; background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 0 2px;
    }
    .initials-cancel:hover { color: #500000; }
    .task-done-msg {
      font-size: 0.75rem; font-weight: 600; color: #1a6b3c;
    }

    @media (max-width: 700px) {
      .detail-grid { grid-template-columns: 1fr 1fr; }
      .speaker-details { padding-left: 0; }
      .header-top { flex-direction: column; gap: 8px; }
    }
    @media (max-width: 480px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  </div>

</main>

var params  = new URLSearchParams(window.location.search);
var eventId = params.get("id");
var ev      = null;   // module-level — renderTasks() and renderProgress() reference this

// ── Load event from live backend ─────────────────────────────
post({ action: 'get_event_tasks', eventId: eventId })
  .then(function(res) {
    if (!res || res.error || !res.event) {
      document.getElementById("eventTitle").textContent = "Event not found";
      return;
    }
    var a = res.event;
    // Map API response to the shape renderEvent() expects
    ev = {
      name:        a.name,
      type:        a.type,
      date:        a.date,           // "yyyy-MM-dd" — parseable by new Date()
      time:        a.time,
      location:    a.location,
      hasFood:     a.hasFood,
      hasZoom:     a.hasZoom,
      description: a.description,
      rsvpLink:    a.rsvpLink,
      flyerLink:   a.flyerLink,
      blurb:       a.blurb,
      speakers:    [],
      promoLog:    [],
      tasks: (res.tasks || []).map(function(t) {
        return {
          task:     t.task,
          category: t.category,
          initials: t.initials,
          dueDate:  t.dueDate,
          done:     t.status === 'Complete',
          note:     t.note || '',
        };
      }),
    };
    renderEvent(ev);
    document.getElementById('viewTasksBtn').href =
      'tasks.html?event=' + encodeURIComponent(eventId);
  })
  .catch(function() {
    document.getElementById("eventTitle").textContent = "Could not load event";
  });

function renderEvent(ev) {
  document.title = ev.name + " \u2014 ERC Event Hub";
  document.getElementById("eventTitle").innerHTML =
    ev.name + ' <span class="type-badge-header">' + ev.type + '</span>';

  var eventDate = new Date(ev.date + "T12:00:00");
  var dateStr = eventDate.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  document.getElementById("eventMeta").innerHTML =
    '<span>' + dateStr + '</span>' +
    (ev.time ? '<span>' + ev.time + '</span>' : '') +
    (ev.location && ev.location !== "TBD" ? '<span>' + ev.location + '</span>' : '');

  // ── Key Details
  var grid = document.getElementById("detailGrid");
  var fields = [
    { label: "Date",            value: dateStr,               key: "date" },
    { label: "Time",            value: ev.time,               key: "time" },
    { label: "Location",        value: ev.location,           key: "location" },
  ];
  if (ev.hasFood)             fields.push({ label: "Food / Catering", value: "Yes",                  key: "food" });
  if (ev.hasZoom)             fields.push({ label: "Zoom",            value: "Yes",                  key: "zoom" });
  if (ev.estimatedAttendance) fields.push({ label: "Est. Attendance", value: ev.estimatedAttendance, key: "attendance" });
  fields.forEach(function(d) {
    var item = document.createElement("div");
    item.className = "detail-item";
    var val = d.value || "";
    var isEmpty = !val || val === "TBD";
    item.innerHTML =
      '<label>' + d.label + '</label>' +
      '<span class="editable-field' + (isEmpty ? ' empty-field' : '') +
      '" data-key="' + d.key + '" contenteditable="false">' +
      (isEmpty ? "—" : val) + '</span>';

  if (ev.note) {
    var noteItem = document.createElement("div");

    grid.appendChild(noteItem);
  }

  // ── Links row
  var ERC_ZOOM_URL = "https://tamu.zoom.us/j/3728395283?pwd=WoTHqt6Ppbw0XSYEAiQqMFLNd6Ba8W.1";
  var lr = document.getElementById("linkTabs");
  var linkEditSection = document.getElementById("linkEditSection");

  var externalTypes = ["EdTalk", "In the Works", "Miscellaneous"];

  // ── Blurb (show for external events)

      var isSent = p.status === "Sent";
      var tr = document.createElement("tr");
      tr.innerHTML =

        '<td>' +
          '<label style="display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;">' +
            '<input type="checkbox" class="promo-check" style="width:15px;height:15px;accent-color:#500000;cursor:pointer;flex-shrink:0;"' + (isSent ? " checked" : "") + '>' +
            '<span class="promo-status-label" style="font-size:0.78rem;font-weight:600;color:' + (isSent ? "#1a6b3c" : "#bbb") + ';">' + (isSent ? "Sent" : "Pending") + '</span>' +

        '</td>' +
        '<td class="promo-date-cell" style="font-size:0.82rem;color:#666;">' + (p.dateSent || "") + '</td>';

      var checkEl  = tr.querySelector(".promo-check");
      var labelEl  = tr.querySelector(".promo-status-label");
      var dateCell = tr.querySelector(".promo-date-cell");

      checkEl.addEventListener("change", function() {
        if (this.checked) {
          p.status = "Sent";
          labelEl.textContent = "Sent";
          labelEl.style.color = "#1a6b3c";
          if (!p.dateSent) {
            var today = new Date();
            p.dateSent = (today.getMonth()+1) + "/" + today.getDate() + "/" + today.getFullYear();
            dateCell.textContent = p.dateSent;
          }
        } else {
          p.status = "Pending";
          labelEl.textContent = "Pending";
          labelEl.style.color = "#bbb";
          p.dateSent = "";
          dateCell.textContent = "";
        }
        // TODO: sync to sheet
      });

      pb.appendChild(tr);
    });

  }

  // ── Tasks
  renderTasks();

  // ── Progress
  renderProgress();

  // ── Edit page toggle
  var editBtn = document.getElementById("editPageBtn");
  var editing = false;
  var hasUnsavedChanges = false;

  // Warn before leaving with unsaved edits
  window.addEventListener("beforeunload", function(e) {
    if (editing && hasUnsavedChanges) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  editBtn.addEventListener("click", function() {
    editing = !editing;
    if (!editing) hasUnsavedChanges = false; // cleared on Done Editing
    document.body.classList.toggle("editing", editing);
    editBtn.textContent = editing ? "Done Editing" : "Edit Page";
    editBtn.classList.toggle("active", editing);

    // Toggle contenteditable on all .editable-field elements
    document.querySelectorAll(".editable-field").forEach(function(el) {
      el.contentEditable = editing ? "true" : "false";
      if (editing) {
        // Track any changes made
        el.addEventListener("input", function() { hasUnsavedChanges = true; }, { once: false });
      }
      if (!editing) {
        var isEmpty = !el.textContent.trim() || el.textContent.trim() === "\u2014";
        el.classList.toggle("empty-field", isEmpty);
        // TODO: save changes to sheet
      }

    document.querySelectorAll(".link-view").forEach(function(el) {
      el.classList.toggle("hidden", editing);
    });
    document.getElementById("linkEditSection").classList.toggle("hidden", !editing);

    // On exit edit mode — update link pills from input values
    if (!editing) {
      document.querySelectorAll(".link-edit-input").forEach(function(input) {

      });

// =============================================================
// RENDER TASKS — date-sorted table with "Due This Week" divider
// =============================================================
function renderTasks() {
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var endOfWeek = new Date(today); endOfWeek.setDate(endOfWeek.getDate() + 7);

  function parseDue(str) {
    var dp = str.split("/");
    return new Date(parseInt(dp[2]), parseInt(dp[0]) - 1, parseInt(dp[1]));
  }
  function fmtDue(str) {
    return parseDue(str).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }
  function dueCls(t) {
    if (t.done) return "";
    var d = parseDue(t.dueDate);
    if (d < today) return " overdue";
    if (d.getTime() === today.getTime()) return " today";
    return "";
  }

  var sec = document.getElementById("taskSection");
  sec.innerHTML = "";

  // ── Wrap in card
  var card = document.createElement("div");
  card.className = "card";

  var h2 = document.createElement("h2");
  h2.textContent = "Tasks";
  card.appendChild(h2);

  // ── Filter bar
  var filterBar = document.createElement("div");
  filterBar.className = "task-filter-bar";
  filterBar.innerHTML =
    '<button class="filter-btn active" data-filter="all">All</button>' +
    '<button class="filter-btn" data-filter="KB">KB</button>' +
    '<button class="filter-btn" data-filter="CM">CM</button>' +
    '<button class="filter-btn" data-filter="AK">AK</button>' +
    '<button class="filter-btn" data-filter="GA">GA</button>';
  card.appendChild(filterBar);

  var activeFilter = "all";
  filterBar.addEventListener("click", function(e) {
    var btn = e.target.closest(".filter-btn");
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    filterBar.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    applyFilter();
  });

  function applyFilter() {
    tbl.querySelectorAll(".task-main-row, .task-detail-row").forEach(function(row) {
      var who = row.dataset.who || "";
      var hide = activeFilter !== "all" && who !== activeFilter;
      row.classList.toggle("filter-hidden", hide);
    });
  }

  // ── Sort by due date
  var sorted = ev.tasks.slice().sort(function(a, b) {
    return parseDue(a.dueDate) - parseDue(b.dueDate);
  });
  var thisWeek = sorted.filter(function(t) { return parseDue(t.dueDate) <= endOfWeek; });
  var upcoming = sorted.filter(function(t) { return parseDue(t.dueDate) > endOfWeek; });

  // ── Build table
  var tbl = document.createElement("table");
  tbl.className = "task-tbl";
  tbl.innerHTML = '<thead><tr>' +
    '<th></th><th>Task</th><th>Due</th><th>Who</th>' +
    '</tr></thead>';
  var tbody = document.createElement("tbody");

  function addDivider(label) {
    var tr = document.createElement("tr");
    tr.className = "section-divider-row";
    tr.innerHTML = '<td colspan="4">' + label + '</td>';
    tbody.appendChild(tr);
  }

  function addTaskRow(t) {
    var dc = dueCls(t);

    // ── Main row
    var mainRow = document.createElement("tr");
    mainRow.className = "task-main-row" + (t.done ? " done" : "");
    mainRow.dataset.who = t.completedBy || t.initials;
    mainRow.innerHTML =
      '<td class="task-check-cell"><input type="checkbox" class="task-check"' + (t.done ? " checked" : "") + '></td>' +
      '<td class="task-name-cell">' +
        '<span class="task-name-text">' + t.task + '</span>' +
        (t.note ? ' <button type="button" class="expand-btn" title="Show note">&#9656;</button>' : '') +
      '</td>' +
      '<td class="task-due-cell' + dc + '">' + fmtDue(t.dueDate) + '</td>' +
      '<td class="task-who-cell"><span class="task-badge' + (t.done ? ' done-badge' : '') + '">' + (t.completedBy || t.initials) + '</span></td>';
    tbody.appendChild(mainRow);

    // ── Detail row (note + initials flow lives here)
    var detailRow = document.createElement("tr");
    detailRow.className = "task-detail-row hidden";
    detailRow.dataset.who = t.completedBy || t.initials;
    var detailCell = document.createElement("td");
    detailCell.colSpan = 4;
    detailCell.className = "task-detail-cell";
    if (t.note) detailCell.innerHTML = '<div class="task-note-text">' + t.note + '</div>';
    detailRow.appendChild(detailCell);
    tbody.appendChild(detailRow);

    // Expand/collapse note
    if (t.note) {
      var expandBtn = mainRow.querySelector(".expand-btn");
      var noteOpen = false;
      expandBtn.addEventListener("click", function() {
        noteOpen = !noteOpen;
        this.innerHTML = noteOpen ? "&#9662;" : "&#9656;";
        if (!detailRow.querySelector(".initials-inline")) {
          detailRow.classList.toggle("hidden", !noteOpen);
        }
      });
    }

    // Checkbox → initials flow
    var cb = mainRow.querySelector(".task-check");
    cb.addEventListener("change", function() {
      if (this.checked) {
        showInlineInitials(t, mainRow, detailRow, detailCell, this);
      } else {
        t.done = false; t.completedBy = null;
        mainRow.classList.remove("done");
        mainRow.dataset.who = t.initials;
        mainRow.querySelector(".task-badge").textContent = t.initials;
        mainRow.querySelector(".task-badge").className = "task-badge";
        detailCell.innerHTML = t.note ? '<div class="task-note-text">' + t.note + '</div>' : '';
        detailRow.classList.add("hidden");
        renderProgress();
      }
    });
  }

  if (thisWeek.length > 0) { addDivider("Due This Week"); thisWeek.forEach(addTaskRow); }
  if (upcoming.length > 0) { addDivider("Upcoming"); upcoming.forEach(addTaskRow); }
  if (sorted.length === 0) {
    var emptyRow = document.createElement("tr");
    emptyRow.innerHTML = '<td colspan="4" style="padding:16px 8px;color:#bbb;font-size:0.875rem;">No tasks yet.</td>';
    tbody.appendChild(emptyRow);
  }

  tbl.appendChild(tbody);
  card.appendChild(tbl);
  sec.appendChild(card);
}

// =============================================================
// INLINE INITIALS (table context)
// =============================================================
function showInlineInitials(task, mainRow, detailRow, detailCell, cb) {
  document.querySelectorAll(".initials-inline").forEach(function(el) { el.remove(); });
  detailRow.classList.remove("hidden");

  var noteHTML = task.note ? '<div class="task-note-text">' + task.note + '</div>' : '';
  detailCell.innerHTML = noteHTML +
    '<div class="initials-inline">' +
      '<input type="text" maxlength="2" class="initials-input" autocomplete="off">' +
      '<button type="button" class="mark-done-btn">Mark as done</button>' +
      '<button type="button" class="initials-cancel">\u00d7</button>' +
    '</div>';

  var input   = detailCell.querySelector(".initials-input");
  var doneBtn = detailCell.querySelector(".mark-done-btn");
  var cancelBtn = detailCell.querySelector(".initials-cancel");
  input.focus();

  function confirmDone() {
    var val = input.value.toUpperCase().trim();
    if (!val) { input.focus(); input.style.borderColor = "#c0392b"; return; }
    task.done = true; task.completedBy = val;
    mainRow.classList.add("done");
    mainRow.dataset.who = val;
    mainRow.querySelector(".task-badge").textContent = val;
    mainRow.querySelector(".task-badge").className = "task-badge done-badge";
    detailCell.innerHTML = noteHTML + '<span class="task-done-msg">Task done!</span>';
    setTimeout(function() {
      detailRow.classList.add("hidden");
      detailCell.innerHTML = noteHTML;
    }, 1800);
    renderProgress();
    // TODO: POST to Apps Script to sync to sheet
  }

  function cancelIt() {
    cb.checked = false;
    detailCell.innerHTML = noteHTML;
    if (!noteHTML) detailRow.classList.add("hidden");
  }

  doneBtn.addEventListener("click", confirmDone);
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") confirmDone();
    if (e.key === "Escape") cancelIt();
  });
  cancelBtn.addEventListener("click", cancelIt);
}

// =============================================================
// PROGRESS
// =============================================================
function renderProgress() {
  var done = ev.tasks.filter(function(t) { return t.done; }).length;
  var tot  = ev.tasks.length;
  var pct  = tot > 0 ? Math.round((done / tot) * 100) : 0;

  document.getElementById("headerProgress").innerHTML =
    '<div class="header-progress-bar"><div class="header-progress-fill" style="width:' + pct + '%"></div></div>' +
    '<span class="header-progress-text">' + pct + '% &middot; ' + done + ' / ' + tot + ' tasks</span>';
}

// =============================================================
// HELPERS
// =============================================================
function post(payload) {
  return fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload),
  }).then(function(r) { return r.json(); });
}

// ── Archive / Mark Complete ──────────────────────────────────
document.getElementById('archiveBtn').addEventListener('click', function() {
  var eventName = document.title.replace(' \u2014 ERC Event Hub', '') || 'this event';
  if (!confirm('Mark "' + eventName + '" as complete?\n\nIt will be moved to Past Events on the hub.')) return;
  var btn = this;
  btn.disabled = true;
  btn.textContent = 'Saving\u2026';

  post({
    action:  'update_event',
    eventId: eventId,
    fields:  { status: 'Completed' },
  })
  .then(function(res) {
    if (res.error) throw new Error(res.error);
    // Save to localStorage so index.html can show past events
    try {
      var archived = JSON.parse(localStorage.getItem('erc_archived_events') || '[]');
      if (archived.indexOf(eventId) === -1) archived.push(eventId);
      localStorage.setItem('erc_archived_events', JSON.stringify(archived));
    } catch(e) {}
    btn.textContent = '\u2713 Archived';
    btn.style.background = 'rgba(255,255,255,0.15)';
    var sub = document.querySelector('.event-header-meta');
    if (sub) {
      var chip = document.createElement('span');
      chip.textContent = 'Archived';
      chip.style.cssText = 'font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,0.2);color:#fff;margin-left:8px;';
      sub.appendChild(chip);
    }
  })
  .catch(function(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.textContent = '\u2713 Complete';
  });
});
</script>
</body>
