<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ERC Listserv Sign-Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #fff;
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Work Sans', sans-serif;
      color: #333;
      line-height: 1.3;
    }

    /* ── Card ─────────────────────────────────────── */
    .signup-card {
      width: 100%;
      max-width: 480px;
      border: 1px solid #e2e2e2;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .signup-card-header {
      background: #500000;
      padding: 18px 24px;
    }
    .signup-card-header h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }
    .signup-card-body {
      padding: 24px;
    }

    /* ── Form fields ──────────────────────────────── */
    .field-label {
      font-family: 'Work Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      display: block;
      margin-bottom: 5px;
    }
    .field-input {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.875rem;
      color: #333;
      width: 100%;
      border: 1px solid #e2e2e2;
      border-radius: 4px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus {
      border-color: #500000;
      box-shadow: 0 0 0 3px rgba(80,0,0,0.08);
    }
    .field-group {
      margin-bottom: 16px;
    }

    /* ── Submit button ────────────────────────────── */
    .btn-subscribe {
      font-family: 'Work Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      background: #500000;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-subscribe:hover:not(:disabled) { background: #3a0000; }
    .btn-subscribe:disabled {
      background: #999;
      cursor: not-allowed;
    }

    /* ── Error message ────────────────────────────── */
    .error-msg {
      font-size: 0.82rem;
      color: #c0392b;
      margin-top: 10px;
      display: none;
    }

    /* ── Success state ────────────────────────────── */
    .success-body {
      display: none;
      padding: 24px;
    }
    .success-title {
      font-family: 'Work Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }
    .success-body p {
      font-size: 0.875rem;
      color: #555;
      line-height: 1.7;
      margin: 0;
    }
    .success-body a {
      color: #500000;
    }
    .success-body a:hover { color: #3a0000; }
  </style>
</head>
<body>

  <img src="erc-logo.png" alt="Texas A&M University Education Research Center" style="width:130px;margin-bottom:28px;"/>

  <div class="signup-card">

    <div class="signup-card-header">
      <h1>Subscribe to the ERC Listserv</h1>
    </div>

    <!-- Form state -->
    <div class="signup-card-body" id="form-body">
      <form id="signup-form" autocomplete="off">

        <div class="field-group">
          <label class="field-label" for="field-name">Name</label>
          <input
            class="field-input"
            type="text"
            id="field-name"
            name="name"
            autocomplete="off"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="field-email">Email</label>
          <input
            class="field-input"
            type="email"
            id="field-email"
            name="email"
            autocomplete="off"
            required
          />
        </div>

        <button class="btn-subscribe" type="submit" id="submit-btn">Subscribe</button>
        <div class="error-msg" id="error-msg">Something went wrong. Please try again.</div>

      </form>
    </div>

    <!-- Success state (hidden until submission succeeds) -->
    <div class="success-body" id="success-body">
      <div class="success-title">Thank you for subscribing!</div>
      <p>You have been successfully added to our mailing list. We look forward to sharing our latest research findings and keeping you connected with our ongoing work at the <a href="https://erc.cehd.tamu.edu/" target="_blank" rel="noopener">Education Research Center</a>.</p>
    </div>

  </div>

<script>
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz8neQVg5opjiTIATq8-xBhTFiA1WaDx8ST6rKAduxz0cf3LYAChNstg_UK1hoizoZ_/exec';

document.getElementById('signup-form').addEventListener('submit', async function (e) {
  e.preventDefault();

  const name  = document.getElementById('field-name').value.trim();
  const email = document.getElementById('field-email').value.trim();
  const btn   = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');

  // Basic client-side validation
  if (!name || !email) return;

  // Capture date and time at moment of submission
  const now = new Date();
  const date_subscribed = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  const time = now.toTimeString().slice(0, 8);            // HH:MM:SS

  // Disable button and hide any previous error
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  errEl.style.display = 'none';

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'listserv_signup', name, email, date_subscribed, time })
    });

    const data = await res.json();
    if (!res.ok || data.status !== 'ok') throw new Error('Webhook error');

    // Show success state
    document.getElementById('form-body').style.display    = 'none';
    document.getElementById('success-body').style.display = 'block';

  } catch {
    // Re-enable button and show error
    btn.disabled = false;
    btn.textContent = 'Subscribe';
    errEl.style.display = 'block';
  }
});
</script>

</body>
</html>
