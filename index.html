<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERC Event Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    .hub-header {
      background: #500000;
      color: #fff;
      padding: 24px 24px 20px;
    }

    .hub-header-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .hub-header h1 {
      font-family: 'Work Sans', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .hub-header p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* ── Main ───────────────────────────────────────────── */
    .hub-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── Action buttons ─────────────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 36px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .action-btn:hover {
      border-color: #500000;
      box-shadow: 0 2px 8px rgba(80,0,0,0.08);
    }

    .action-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .action-icon.submit  { background: #fdf0f0; color: #500000; }
    .action-icon.tasks   { background: #eef6ee; color: #2e7d32; }
    .action-icon.manual  { background: #eef0f8; color: #1565c0; }
    .action-icon.admin   { background: #f0f0f0; color: #555; }

    /* ── Section headers ────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-family: 'Work Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
    }

    .section-header .badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      background: #eee;
      padding: 3px 10px;
      border-radius: 12px;
    }

    /* ── Week bar ───────────────────────────────────────── */
    .week-bar {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 36px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    .week-day {
      flex: 1;
      min-width: 100px;
      text-align: center;
      padding: 10px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #777;
      transition: background 0.15s;
    }

    .week-day .day-label {
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
    }

    .week-day .day-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin: 4px 0 2px;
    }

    .week-day.today {
      background: #500000;
      color: #fff;
    }

    .week-day.today .day-label,
    .week-day.today .day-num,
    .week-day.today .day-event { color: #fff; }

    .week-day.has-event { background: #fdf6ec; }
    .week-day.has-event .day-num { color: #500000; }

    .day-event {
      font-size: 0.7rem;
      font-weight: 600;
      margin-top: 4px;
      line-height: 1.3;
      color: #500000;
    }

    .week-day.today .day-event { color: rgba(255,255,255,0.9); }

    /* ── Event cards ────────────────────────────────────── */
    .event-grid {
      display: grid;
      gap: 14px;
      margin-bottom: 36px;
    }

    .event-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      display: block;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .event-card:hover {
      border-color: #500000;
      box-shadow: 0 2px 8px rgba(80,0,0,0.08);
    }

    /* ── Past events ─────────────────────────────────────── */
    .past-event-item {
      background: #fff; border: 1px solid #e8e8e8; border-radius: 6px;
      padding: 12px 18px; display: flex; align-items: center;
      gap: 12px; margin-bottom: 8px; opacity: 0.7;
    }
    .past-event-item:hover { opacity: 1; }
    .past-event-name { font-size: 0.875rem; font-weight: 600; color: #555; flex: 1; }
    .past-event-date { font-size: 0.78rem; color: #aaa; }
    .past-badge {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 2px 7px; border-radius: 3px;
      background: #e8f5e8; color: #2e7d32;
    }

    .event-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .event-name {
      font-family: 'Work Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .event-type-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-edtalk     { background: #fdf0f0; color: #500000; }
    .badge-happyhour  { background: #fdf6ec; color: #7a5500; }
    .badge-itw        { background: #eef0f8; color: #1565c0; }
    .badge-internal   { background: #eee;    color: #555; }

    .event-meta {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .event-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── Progress bar ───────────────────────────────────── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #500000;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      white-space: nowrap;
    }

    /* ── Reminder pills ─────────────────────────────────── */
    .reminder-pill {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 3px;
      margin-left: 8px;
    }

    .pill-today    { background: #500000; color: #fff; }
    .pill-tomorrow { background: #f0d58a; color: #7a5500; }
    .pill-week     { background: #e0e0e0; color: #555; }

    /* ── Calendar placeholder ───────────────────────────── */
    .calendar-placeholder {
      background: #fff;
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .calendar-placeholder span { font-size: 1.5rem; display: block; margin-bottom: 8px; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .actions { grid-template-columns: 1fr; }
      .week-bar { gap: 4px; }
      .week-day { min-width: 70px; }
    }
  </style>
</head>
<body>

<header class="hub-header">
  <div class="hub-header-inner">
    <h1>ERC Event Hub</h1>
    <p>Education Research Center — Event Planning</p>
  </div>
</header>

<main class="hub-main">

  <!-- ── Action Buttons ─────────────────────────────────── -->
  <div class="actions">
    <a class="action-btn" href="submit.html">
      <div class="action-icon submit">+</div>
      Submit Event
    </a>
    <a class="action-btn" href="tasks.html">
      <div class="action-icon tasks">&#10003;</div>
      Event Planning Tasks
    </a>
    <a class="action-btn" href="manual.html" id="manualLink">
      <div class="action-icon manual">&#9776;</div>
      Event Planning Manual
    </a>
    <a class="action-btn" href="admin.html">
      <div class="action-icon admin">&#9881;</div>
      Admin
    </a>
  </div>

  <!-- ── This Week ──────────────────────────────────────── -->
  <div class="section-header">
    <h2>This Week</h2>
  </div>

  <div class="week-bar" id="weekBar"></div>

  <!-- ── Upcoming Events ────────────────────────────────── -->
  <div class="section-header">
    <h2>Upcoming Events</h2>
    <span class="badge" id="eventCount"></span>
  </div>

  <div class="event-grid" id="eventGrid"></div>

  <!-- ── Past Events ────────────────────────────────────── -->
  <div id="pastEventsSection" class="hidden">
    <div class="section-header" style="margin-top:8px;">
      <h2>Past Events</h2>
    </div>
    <div id="pastEventsList"></div>
  </div>

</main>

<script>
// =============================================================
// EVENT DATA
// Pulled from the current working spreadsheet.
// Will be replaced with Apps Script API calls once wired up.
// =============================================================
const EVENTS = [
  {
    id: "itw-faculty-research-2026",
    name: "In the Works: Faculty Research",
    type: "In the Works",
    badgeClass: "badge-itw",
    date: "2026-04-23",
    time: "12:00 PM",
    location: "TBD",
    totalTasks: 22,
    completedTasks: 0,
    hasFood: true,
    hasZoom: false,
  },
  {
    id: "happy-hour-spring-2026",
    name: "ERC Happy Hour",
    type: "Happy Hour",
    badgeClass: "badge-happyhour",
    date: "2026-04-23",
    time: "5:00 PM",
    location: "TBD",
    totalTasks: 18,
    completedTasks: 0,
    hasFood: true,
    hasZoom: false,
  },
  {
    id: "edtalk-woltering-2026",
    name: "EdTalk: Steven Woltering",
    type: "EdTalk",
    badgeClass: "badge-edtalk",
    date: "2026-05-06",
    time: "12:00 PM",
    location: "TBD",
    totalTasks: 20,
    completedTasks: 0,
    hasFood: true,
    hasZoom: false,
  },
];

// =============================================================
// WEEK BAR
// =============================================================
function buildWeekBar() {
  const bar = document.getElementById("weekBar");
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7));

  const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);

    const dateStr = d.toISOString().split("T")[0];
    const isToday = dateStr === today.toISOString().split("T")[0];

    // Check if any event falls on this day
    const dayEvents = EVENTS.filter(function(e) { return e.date === dateStr; });
    const hasEvent = dayEvents.length > 0;

    const el = document.createElement("div");
    el.className = "week-day" + (isToday ? " today" : "") + (hasEvent && !isToday ? " has-event" : "");

    let eventHTML = "";
    dayEvents.forEach(function(ev) {
      eventHTML += '<div class="day-event">' + ev.name.split(":")[0] + '</div>';
    });

    el.innerHTML =
      '<div class="day-label">' + dayNames[i] + '</div>' +
      '<div class="day-num">' + d.getDate() + '</div>' +
      eventHTML;

    bar.appendChild(el);
  }
}

// =============================================================
// EVENT CARDS
// =============================================================
function buildEventCards() {
  const grid = document.getElementById("eventGrid");
  const today = new Date();

  // Sort by date ascending
  const sorted = EVENTS.slice().sort(function(a, b) {
    return new Date(a.date) - new Date(b.date);
  });

  document.getElementById("eventCount").textContent = sorted.length + " events";

  sorted.forEach(function(ev) {
    const eventDate = new Date(ev.date + "T12:00:00");
    const daysUntil = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));

    // Format date
    const options = { weekday: "short", month: "short", day: "numeric" };
    const dateFormatted = eventDate.toLocaleDateString("en-US", options);

    // Countdown text
    let countdown = "";
    if (daysUntil === 0) countdown = "Today";
    else if (daysUntil === 1) countdown = "Tomorrow";
    else if (daysUntil > 0) countdown = daysUntil + " days away";
    else countdown = "Past";

    // Reminder pill
    let pill = "";
    if (daysUntil === 0) pill = '<span class="reminder-pill pill-today">Today</span>';
    else if (daysUntil === 1) pill = '<span class="reminder-pill pill-tomorrow">Tomorrow</span>';
    else if (daysUntil > 0 && daysUntil <= 7) pill = '<span class="reminder-pill pill-week">' + daysUntil + 'd</span>';

    // Progress
    const pct = ev.totalTasks > 0 ? Math.round((ev.completedTasks / ev.totalTasks) * 100) : 0;

    const card = document.createElement("a");
    card.className = "event-card";
    card.href = "event.html?id=" + ev.id;

    card.innerHTML =
      '<div class="event-card-top">' +
        '<div class="event-name">' + ev.name + pill + '</div>' +
        '<span class="event-type-badge ' + ev.badgeClass + '">' + ev.type + '</span>' +
      '</div>' +
      '<div class="event-meta">' +
        '<span>' + dateFormatted + (ev.time ? " &middot; " + ev.time : "") + '</span>' +
        '<span>' + countdown + '</span>' +
        (ev.location !== "TBD" ? '<span>' + ev.location + '</span>' : '') +
      '</div>' +
      '<a href="tasks.html?event=' + ev.id + '" class="progress-row" style="text-decoration:none;" title="View tasks for this event">' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="progress-label" style="color:#888;">' + ev.completedTasks + ' / ' + ev.totalTasks + ' tasks →</span>' +
      '</a>';

    grid.appendChild(card);
  });
}

// =============================================================
// INIT
// =============================================================
buildWeekBar();
buildEventCards();

// =============================================================
// PAST EVENTS
// Reads archived event IDs from localStorage and displays them.
// event.html writes to localStorage when an event is completed.
// =============================================================
function buildPastEvents() {
  var archived = [];
  try {
    archived = JSON.parse(localStorage.getItem('erc_archived_events') || '[]');
  } catch(e) { archived = []; }

  // Also check if any EVENTS in the mock data have been archived
  var mockArchived = EVENTS.filter(function(ev) {
    return archived.indexOf(ev.id) !== -1;
  });

  if (mockArchived.length === 0 && archived.length === 0) return;

  var section = document.getElementById('pastEventsSection');
  var list    = document.getElementById('pastEventsList');
  section.classList.remove('hidden');

  archived.forEach(function(id) {
    var ev = EVENTS.find(function(e) { return e.id === id; }) || { id: id, name: id, date: '', type: '' };
    var item = document.createElement('a');
    item.className = 'past-event-item';
    item.href = 'event.html?id=' + ev.id;
    item.style.textDecoration = 'none';
    item.innerHTML =
      '<span class="past-badge">Complete</span>' +
      '<span class="past-event-name">' + (ev.name || id) + '</span>' +
      (ev.date ? '<span class="past-event-date">' + ev.date + '</span>' : '');
    list.appendChild(item);
  });
}

buildPastEvents();
</script>
</body>
</html>
